<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>歐桑與莉莉的地下城</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #111; --parch: #f0e8d0; --acc: #7a1010; --gold: #b8900a;
  --bg: #0d0a08; --panel: #0a0806; --border: #2a2010; --text: #c0a870;
}
body {
  background: #000;
  font-family: 'Noto Serif TC', Georgia, serif;
  color: var(--ink);
  display: flex; align-items: center; justify-content: center;
  width: 100vw; height: 100vh; overflow: hidden;
}

/* 16:9 固定比例容器 */
#game-wrap {
  position: relative;
  background: #111;
  overflow: hidden;
  /* 尺寸由JS動態設定 */
}

.scene { display: none; }
.scene.on { display: flex; }

/* ======== TITLE ======== */
#sc-title {
  flex-direction: column; align-items: center; justify-content: center;
  gap: 20px; width: 100%; height: 100%;
}
.t-box {
  background: var(--parch); border: 3px solid var(--ink);
  padding: 32px 40px; text-align: center; max-width: 400px; width: 90%;
}
.t-title { font-size: 1.8rem; font-weight: 700; letter-spacing: .1em; color: var(--acc); }
.t-sub   { font-size: .8rem; color: #666; margin-top: 6px; }

/* ======== CHAR CREATE ======== */
#sc-char {
  flex-direction: column; align-items: center; justify-content: center;
  width: 100%; height: 100%; background: #222;
}
.char-box { background: var(--parch); border: 3px solid var(--ink); padding: 24px; width: 340px; }
.char-title { font-size: 1.1rem; font-weight: 700; text-align: center; margin-bottom: 16px; letter-spacing: .1em; }
.stat-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  border: 2px solid var(--ink); padding: 8px 10px; background: #faf5e8;
}
.stat-name { width: 52px; font-weight: 700; font-size: .85rem; }
.stat-val  { font-size: 1.3rem; font-weight: 700; color: var(--acc); width: 40px; text-align: center; }
.stat-desc { font-size: 20px; color: #555; flex: 1; text-align: right; font-style: italic; }
.dice-btn  {
  background: var(--ink); color: var(--parch); border: none;
  padding: 5px 10px; cursor: pointer; font-family: inherit; font-size: .8rem;
}
.dice-btn:active { opacity: .7; }
.btn {
  background: var(--ink); color: var(--parch); border: 2px solid #333;
  font-family: inherit; font-size: .85rem; cursor: pointer;
  padding: 10px 20px; display: block; width: 100%;
  text-align: center; letter-spacing: .1em; margin-top: 10px;
}
.btn-gold { background: var(--gold); color: #111; border-color: #8a6a20; }

/* ======== MAIN ======== */
#sc-main {
  flex-direction: column;
  width: 100%; height: 100%;
  background: var(--bg);
  overflow: hidden;
}

/* 上方列 */
#top-bar {
  display: flex; align-items: center;
  height: 44px; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  background: #080604;
}
#top-position {
  width: 110px; flex-shrink: 0;
  border-right: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: #706050; height: 100%;
}
/* 先攻置中 */
#top-initiative {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  gap: 5px;
}
.init-label { font-size: 20px; color: #504030; margin-right: 4px; }
.init-token {
  width: 28px; height: 28px;
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; flex-shrink: 0; border-radius: 2px;
}
.init-token.active { border-color: var(--gold); box-shadow: 0 0 5px rgba(184,144,10,.5); }
.init-token.player-token { background: #1a2a3a; }
.init-token.enemy-token  { background: #1a2a1a; }
#top-bg-label {
  width: 140px; flex-shrink: 0;
  border-left: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: #504030; font-style: italic; height: 100%;
}

/* 中間場景 */
#mid-scene {
  flex: 1;
  background: #140f08;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
  position: relative;
}

/* 角色群容器 */
#ui-combatants {
  display: flex;
  align-items: flex-end;
  gap: 0;
}

#ui-party   { display: flex; align-items: flex-end; gap: 6px; }
#ui-enemies { display: flex; align-items: flex-end; gap: 6px; }

/* 中間分隔 */
.center-divider {
  width: 2px; height: 90px;
  background: linear-gradient(to bottom, transparent, #4a3010 50%, transparent);
  margin: 0 60px;
  align-self: center; flex-shrink: 0;
}

/* 角色卡 */
.slot-card { width: 110px; display: flex; flex-direction: column; align-items: center; }
.slot-empty {
  width: 100px; height: 150px;
  border: 1px dashed #201808;
  display: flex; align-items: center; justify-content: center;
  color: #201808; font-size: 20px;
}
.slot-sprite {
  width: 100px; height: 150px;
  border: 1px solid #2a1a08;
  display: flex; align-items: center; justify-content: center;
  font-size: 3.2rem; position: relative;
  transition: border-color .12s;
}
.slot-sprite.clickable { cursor: pointer; }
.slot-sprite.clickable:hover { border-color: var(--gold); }
.slot-sprite.selected  { border-color: var(--gold); box-shadow: 0 0 6px rgba(184,144,10,.5); }
.slot-name {
  font-size: 20px; color: #806040; margin-top: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; text-align: center;
}
.slot-hpbar  { width: 100px; height: 6px; background: #1a1208; border: 1px solid #2a2010; margin-top: 4px; }
.slot-hpfill { height: 100%; background: #882020; transition: width .3s; }
.slot-hptext { font-size: 20px; color: #605040; margin-top: 2px; text-align: center; }

/* 防禦圖層 */
.defend-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 2.5rem; opacity: 0.6; pointer-events: none;
  background: rgba(100,150,200,0.15);
}
/* 當前行動者高亮 */
.slot-sprite.active-turn { box-shadow: 0 0 0 2px var(--gold); }
/* 先攻軌道死亡 */
.init-token.dead { opacity: 0.2; }

/* 下方 UI */
#bottom-bar {
  display: flex; align-items: stretch;
  height: 300px; flex-shrink: 0;
  border-top: 1px solid var(--border);
  background: var(--panel);
}

/* 莉莉立繪 */
#panel-lily {
  width: 160px; flex-shrink: 0;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 5px; padding: 8px;
}
#lily-sprite {
  width: 120px; height: 160px;
  background: #3a1a1a; border: 1px solid #4a2020;
  display: flex; align-items: center; justify-content: center;
  font-size: 4rem;
}
#panel-lily .lily-name { font-size: 20px; color: #806050; }

/* 莉莉台詞 */
#panel-log {
  width: 180px; flex-shrink: 0;
  border-right: 1px solid var(--border);
  padding: 10px 12px;
  display: flex; flex-direction: column;
  overflow: hidden;
}
#ui-log { font-size: 20px; color: #c8907a; line-height: 2; overflow-y: auto; flex: 1; font-style: italic; }

/* 指令格子 */
#panel-cmd {
  width: 220px; flex-shrink: 0;
  border-right: 1px solid var(--border);
  padding: 10px;
  display: flex; flex-direction: column;
  position: relative;
}
/* 指令層 */
.cmd-layer { display: none; flex-direction: column; flex: 1; gap: 6px; }
.cmd-layer.active { display: flex; }
/* 2×2 格子 */
.cmd-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 6px; flex: 1;
}
/* 3格+X 格子 */
.cmd-grid-3 {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 6px; flex: 1; position: relative;
}
.cmd-btn {
  background: #1a1208; color: #a08060; border: 1px solid #3a2e18;
  font-family: inherit; font-size: 18px; cursor: pointer;
  padding: 0; text-align: center;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; transition: border-color .1s, color .1s; min-height: 50px;
}
.cmd-btn:hover   { border-color: var(--gold); color: var(--gold); }
.cmd-btn:disabled { opacity: .3; cursor: default; }
.cmd-btn.active  { border-color: var(--gold); color: var(--gold); }
.cmd-btn .ci { font-size: 20px; line-height: 1; }
.cmd-btn .cl { font-size: 14px; letter-spacing: .05em; }
/* X 返回鍵 */
.cmd-back {
  position: absolute; top: -8px; right: -8px;
  width: 22px; height: 22px;
  background: #3a1010; border: 1px solid #6a2020; color: #c06050;
  font-family: inherit; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  z-index: 5; border-radius: 2px;
}
.cmd-back:hover { background: #5a1818; color: #f08070; }

/* 敵人資訊 */
#panel-enemy {
  width: 220px; flex-shrink: 0;
  border-right: 1px solid var(--border);
  padding: 10px 12px;
  display: flex; flex-direction: column;
}
#ui-enemy-info { font-size: 20px; color: #807060; line-height: 1.9; flex: 1; }

/* 訊息tab */
.log-tab {
  background: none; border: none; border-bottom: 2px solid transparent;
  font-family: inherit; font-size: 18px; color: #504030;
  padding: 2px 12px 4px; cursor: pointer; letter-spacing: .05em;
}
.log-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.log-tab:hover  { color: var(--text); }

/* 訊息主欄 */
#panel-extra {
  flex: 1;
  padding: 8px 12px;
  display: flex; flex-direction: column;
  overflow: hidden;
  min-width: 0;
}
#ui-status-mini { font-size: 20px; color: var(--text); line-height: 2; overflow-y: auto; flex: 1; }

/* ── 創角骰子方塊 ── */
.df {
  width: 40px; height: 40px;
  border: 3px solid var(--ink); background: var(--parch);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.25rem; font-weight: 700;
  box-shadow: 2px 2px 0 var(--ink); flex-shrink: 0; cursor: pointer;
}
.df.roll { animation: dr .5s ease; }
@keyframes dr {
  0%,100% { transform: rotate(0); }
  40%     { transform: rotate(-20deg) scale(1.2); }
  70%     { transform: rotate(18deg) scale(1.2); }
}

/* ── 戰鬥骰子（mid-scene正中大方塊）── */
#dice-ov {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  display: none; flex-direction: column;
  align-items: center; gap: 6px; z-index: 20;
}
.bdice {
  width: 72px; height: 72px;
  border: 4px solid var(--parch); background: var(--ink);
  color: var(--parch); display: flex; align-items: center;
  justify-content: center; font-size: 2.4rem; font-weight: 700;
  box-shadow: 4px 4px 0 rgba(184,144,10,.5), 0 0 24px rgba(200,160,0,.3);
}
.bdice.spin { animation: bs .6s ease; }
@keyframes bs {
  0%   { transform: rotate(0)   scale(.4); opacity: 0; }
  55%  { transform: rotate(200deg) scale(1.2); opacity: 1; }
  100% { transform: rotate(360deg) scale(1);   opacity: 1; }
}
#dlbl {
  font-size: .8rem; color: var(--gold);
  letter-spacing: .1em; text-shadow: 1px 1px 0 #000;
}

/* ── 浮動傷害數字 ── */
.ftx {
  position: absolute; font-weight: 700; pointer-events: none;
  animation: fu 1.1s ease forwards; z-index: 35;
  font-size: 1.2rem; text-shadow: 2px 2px 0 #000, 0 0 8px rgba(0,0,0,.8);
}
.ftx.big { font-size: 1.8rem; animation: fuBig 1.2s ease forwards; }
@keyframes fu {
  0%   { opacity:1; transform: translateY(0) scale(1); }
  20%  { transform: translateY(-8px) scale(1.1); }
  100% { opacity:0; transform: translateY(-52px) scale(0.9); }
}
@keyframes fuBig {
  0%   { opacity:0; transform: translateY(0) scale(0.5); }
  15%  { opacity:1; transform: translateY(-6px) scale(1.3); }
  100% { opacity:0; transform: translateY(-60px) scale(1); }
}
.fr { color: #ff4444; } .fg { color: #44cc44; }
.fo { color: #ffcc00; }
.fc { color: #ffe066; text-shadow: 0 0 12px #ffaa00, 2px 2px 0 #000; }
.fm { color: #888; font-size: 0.9rem; }

/* ── sprite動畫 ── */
@keyframes atk  { 0%{margin-right:0;} 30%{margin-right:22px;} 70%{margin-right:-6px;} 100%{margin-right:0;} }
@keyframes atkL { 0%{margin-left:0;}  30%{margin-left:22px;}  70%{margin-left:-6px;}  100%{margin-left:0;}  }
@keyframes hit  { 0%,100%{filter:brightness(1);} 50%{filter:brightness(2.5) drop-shadow(0 0 8px rgba(255,80,80,.9));} }
.is-atk  { animation: atk  .35s ease; }
.is-atkL { animation: atkL .35s ease; }
.is-hit  { animation: hit  .35s ease; }

/* ── 結算覆蓋 ── */
#overlay-result {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.84);
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 30; gap: 0;
}
#overlay-result.on { display: flex; }
.result-box {
  background: var(--parch); border: 3px solid var(--ink);
  padding: 28px 40px; text-align: center; min-width: 300px;
}
.result-title { font-size: 1.7rem; font-weight: 700; letter-spacing: .12em; }
.result-title.win  { color: var(--gold); }
.result-title.lose { color: var(--acc);  }
.result-stats {
  font-size: .82rem; color: #444; margin-top: 12px;
  line-height: 2; border-top: 1px solid #ccc; padding-top: 10px;
}
.result-lily {
  font-size: .78rem; color: #666; font-style: italic;
  margin-top: 10px; border-top: 1px solid #ccc; padding-top: 8px;
}
.result-btns { display: flex; gap: 10px; margin-top: 18px; justify-content: center; }
.result-btns .btn { margin: 0; }
</style>
</head>
<body>
<div id="game-wrap">

<!-- 標題 -->
<div id="sc-title" class="scene on">
  <div class="t-box">
    <div style="font-size:3rem;margin-bottom:8px;">⚔️</div>
    <div class="t-title">歐桑與莉莉的地下城</div>
    <div class="t-sub">Dwarfossan &amp; Lily's Dungeon</div>
    <button class="btn btn-gold" style="margin-top:24px;" onclick="showScene('char')">開始冒險</button>
    <button class="btn" style="margin-top:8px;" onclick="alert('（尚未實作）')">繼續遊戲</button>
  </div>
</div>

<!-- 創角 -->
<div id="sc-char" class="scene">
  <div class="char-box">
    <div class="char-title">⚒ 矮人歐桑</div>
    <div class="stat-row">
      <div class="stat-name">能力</div>
      <div class="df" id="df-skill" onclick="rollStat('skill')">?</div>
      <div class="stat-val" id="v-skill">?</div>
      <div class="stat-desc">命中 / 傷害加值</div>
    </div>
    <div class="stat-row">
      <div class="stat-name">防禦</div>
      <div class="df" id="df-def" onclick="rollStat('def')">?</div>
      <div class="stat-val" id="v-def">?</div>
      <div class="stat-desc">敵人需超過此值命中</div>
    </div>
    <div class="stat-row">
      <div class="stat-name">運氣</div>
      <div class="df" id="df-luck" onclick="rollStat('luck')">?</div>
      <div class="stat-val" id="v-luck">?</div>
      <div class="stat-desc">影響事件與掉寶</div>
    </div>
    <div style="font-size:.68rem;color:#666;text-align:center;margin-top:8px;font-style:italic;">
      skill=1d6　def=1d6+10　luck=1d6
    </div>
    <button class="btn btn-gold" id="btn-start" style="display:none;" onclick="startGame()">進入地下城</button>
    <button class="btn" onclick="rollAll()">全部重骰</button>
  </div>
</div>

<!-- 主場景 -->
<div id="sc-main" class="scene">

  <!-- 上方列 -->
  <div id="top-bar">
    <div id="top-position">位置</div>
    <div id="top-initiative">
      <span class="init-label">先攻：</span>
      <div id="init-track" style="display:flex;gap:5px;"></div>
    </div>
    <div id="top-bg-label">哥布林巢穴</div>
  </div>

  <!-- 中間場景 -->
  <div id="mid-scene">
    <div id="dice-ov">
      <div class="bdice" id="bdice">20</div>
      <div id="dlbl">攻擊</div>
    </div>
    <div id="ui-combatants">
      <div id="ui-party"></div>
      <div class="center-divider"></div>
      <div id="ui-enemies"></div>
    </div>
  </div>

  <!-- 結算覆蓋 -->
  <div id="overlay-result">
    <div class="result-box">
      <div class="result-title" id="result-title">—</div>
      <div class="result-stats" id="result-stats"></div>
      <div class="result-lily"  id="result-lily"></div>
      <div class="result-btns">
        <button class="btn btn-gold" id="result-btn-main">繼續探索</button>
        <button class="btn" onclick="showScene('title')">回標題</button>
      </div>
    </div>
  </div>

  <!-- 下方 UI -->
  <div id="bottom-bar">

    <!-- 莉莉立繪 -->
    <div id="panel-lily">
      <div id="lily-sprite">🦊</div>
      <div class="lily-name">莉莉</div>
    </div>

    <!-- 劇情欄（莉莉+角色台詞） -->
    <div id="panel-log">
      <div class="panel-title">劇情</div>
      <div id="ui-drama" style="font-size:18px;color:#c8907a;line-height:2;overflow-y:auto;overflow-x:hidden;flex:1;font-style:italic;word-break:break-all;">
        <div><span style="color:#c8907a;">【莉莉】</span>「……笨矮人，又要往裡面衝了嗎。」</div>
      </div>
    </div>

    <!-- 指令格子 -->
    <div id="panel-cmd">
      <!-- 當前行動角色名稱 -->
      <div id="cmd-actor-name" style="font-size:18px;color:#7ab0c8;padding:4px 2px 6px;border-bottom:1px solid var(--border);margin-bottom:6px;letter-spacing:.05em;">—</div>
      <!-- 第一層 -->
      <div class="cmd-layer active" id="cmd-l0">
        <div class="cmd-grid">
          <button class="cmd-btn" onclick="openCmdLayer('cmd-l1')">
            <span class="ci">⚔️</span><span class="cl">動作</span>
          </button>
          <button class="cmd-btn" disabled>
            <span class="ci">🗡️</span><span class="cl">裝備</span>
          </button>
          <button class="cmd-btn" disabled>
            <span class="ci">🎒</span><span class="cl">道具</span>
          </button>
          <button class="cmd-btn" onclick="openCmdLayer('cmd-l2')">
            <span class="ci">…</span><span class="cl">其他</span>
          </button>
        </div>
        <button class="cmd-btn" onclick="testBattle()" style="margin-top:4px;min-height:32px;">
          <span class="cl">🎲 測試戰鬥</span>
        </button>
      </div>
      <!-- 動作層 -->
      <div class="cmd-layer" id="cmd-l1">
        <div class="panel-title">動作</div>
        <div class="cmd-grid-3">
          <button class="cmd-back" onclick="openCmdLayer('cmd-l0')">✕</button>
          <button class="cmd-btn" id="cmd-attack" onclick="enterAttackMode()">
            <span class="ci">⚔️</span><span class="cl">攻擊</span>
          </button>
          <button class="cmd-btn" onclick="playerDefend()">
            <span class="ci">🛡️</span><span class="cl">防禦</span>
          </button>
          <button class="cmd-btn" disabled>
            <span class="ci">✨</span><span class="cl">技能</span>
          </button>
          <button class="cmd-btn" onclick="playerUseLuck()">
            <span class="ci">🍀</span><span class="cl">運氣</span>
          </button>
        </div>
      </div>
      <!-- 其他層 -->
      <div class="cmd-layer" id="cmd-l2">
        <div class="panel-title">其他</div>
        <div class="cmd-grid-3">
          <button class="cmd-back" onclick="openCmdLayer('cmd-l0')">✕</button>
          <button class="cmd-btn" disabled>
            <span class="ci">🏃</span><span class="cl">移動</span>
          </button>
          <button class="cmd-btn" onclick="playerPersuade()">
            <span class="ci">🗣️</span><span class="cl">說服</span>
          </button>
          <button class="cmd-btn" onclick="playerEscape()">
            <span class="ci">💨</span><span class="cl">逃跑</span>
          </button>
          <button class="cmd-btn" disabled>
            <span class="ci">—</span><span class="cl">　</span>
          </button>
        </div>
      </div>
    </div>

    <!-- 訊息主欄（劇情/判定切換） -->
    <div id="panel-extra">
      <div style="display:flex;border-bottom:1px solid var(--border);margin-bottom:6px;">
        <button class="log-tab active" onclick="switchLogTab('drama')" id="tab-drama">劇情</button>
        <button class="log-tab" onclick="switchLogTab('log')" id="tab-log">判定</button>
      </div>
      <div id="main-drama" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
        <div id="ui-main-drama" style="font-size:18px;line-height:1.8;overflow-y:auto;flex:1;"></div>
      </div>
      <div id="main-log" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
        <div id="ui-status-mini" style="font-size:18px;color:var(--text);line-height:1.8;overflow-y:auto;flex:1;"></div>
      </div>
    </div>

    <!-- 角色資訊（hover共用） -->
    <div id="panel-enemy">
      <div class="panel-title">角色資訊</div>
      <div id="ui-enemy-info">—</div>
    </div>

  </div>
</div>

</div><!-- /game-wrap -->

<script src="config.js"></script>
<script src="state.js"></script>
<script src="db_enemy.js"></script>
<script src="battle.js"></script>
<script src="ui.js"></script>
<script>
// 16:9 縮放
const DESIGN_W = 1280;
const DESIGN_H = 720;

function resizeGame() {
  const wrap = document.getElementById('game-wrap');
  const scaleX = window.innerWidth  / DESIGN_W;
  const scaleY = window.innerHeight / DESIGN_H;
  const scale  = Math.min(scaleX, scaleY);
  wrap.style.width  = DESIGN_W + 'px';
  wrap.style.height = DESIGN_H + 'px';
  wrap.style.transform = `scale(${scale})`;
  wrap.style.transformOrigin = 'top left';
  // 置中
  wrap.style.left = ((window.innerWidth  - DESIGN_W * scale) / 2) + 'px';
  wrap.style.top  = ((window.innerHeight - DESIGN_H * scale) / 2) + 'px';
  wrap.style.position = 'absolute';
}
window.addEventListener('resize', resizeGame);
resizeGame();

// 指令切層
function openCmdLayer(id) {
  document.querySelectorAll('.cmd-layer').forEach(l => l.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

const rolls = { skill:null, def:null, luck:null };
const wt = ms => new Promise(r => setTimeout(r, ms));

async function animDf(elId, finalVal) {
  const el = document.getElementById(elId);
  if (!el) return;
  el.classList.remove('roll'); void el.offsetWidth;
  el.classList.add('roll');
  for (let i = 0; i < 8; i++) { el.textContent = Math.floor(Math.random()*6)+1; await wt(55); }
  el.textContent = finalVal;
  el.classList.remove('roll');
}

async function rollStat(stat) {
  const raw = Math.floor(Math.random()*6)+1;
  const final = stat==='def' ? raw+10 : raw;
  rolls[stat] = final;
  await animDf('df-'+stat, raw);
  // 防禦：演出 raw+10
  if (stat === 'def') {
    const vEl = document.getElementById('v-def');
    vEl.style.color = 'var(--acc)';
    vEl.textContent = raw + '+10';
    await wt(600);
    vEl.style.color = '';
    vEl.textContent = final;
  } else {
    document.getElementById('v-'+stat).textContent = final;
  }
  checkAllRolled();
}

async function rollAll() {
  const rawSk = Math.floor(Math.random()*6)+1;
  const rawDf = Math.floor(Math.random()*6)+1;
  const rawLk = Math.floor(Math.random()*6)+1;
  rolls.skill = rawSk; rolls.def = rawDf+10; rolls.luck = rawLk;
  await Promise.all([
    animDf('df-skill', rawSk),
    animDf('df-def',   rawDf),
    animDf('df-luck',  rawLk),
  ]);
  // 防禦演出
  const vDf = document.getElementById('v-def');
  vDf.style.color = 'var(--acc)'; vDf.textContent = rawDf+'+10';
  document.getElementById('v-skill').textContent = rawSk;
  document.getElementById('v-luck').textContent  = rawLk;
  await wt(600);
  vDf.style.color = ''; vDf.textContent = rawDf+10;
  checkAllRolled();
}
function checkAllRolled() {
  document.getElementById('btn-start').style.display =
    Object.values(rolls).every(v=>v!==null) ? 'block' : 'none';
}
function startGame() {
  G.player = {
    name:'歐桑', color:CONFIG.COLORS.PLAYER,
    skill:rolls.skill, def:rolls.def, luck:rolls.luck, maxLuck:rolls.luck,
    hp:CONFIG.PLAYER.HP_BASE, maxHp:CONFIG.PLAYER.HP_BASE,
    gp:CONFIG.PLAYER.GOLD_START,
    exp:0, level:1, expNext:100,
    inv:[], eq:{weapon:null,armor:null}, status:[], defending:false,
  };
  G.party[0] = G.player;

  // 測試用隊友：莎薇
  G.party[1] = {
    name:'莎薇', color:'#7a4a7a',
    skill:4, def:12, luck:5, maxLuck:5,
    hp:20, maxHp:20,
    gp:0, exp:0, level:1, expNext:100,
    inv:[], eq:{weapon:null,armor:null}, status:[], defending:false,
  };

  showScene('main');
  renderParty();
}
</script>
</body>
</html>
